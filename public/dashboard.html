<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Ultimate Professional Dashboard</title>
    <script src="/socket.io/socket.io.js"></script>
    <style>
        /* --- ALL ORIGINAL CSS PRESERVED --- */
        :root {
            --glass: rgba(255, 255, 255, 0.08);
            --glass-border: rgba(255, 255, 255, 0.15);
            --accent: #00d2ff; 
            --call-green: #22c55e;
            --call-red: #ef4444;
            --settings-yellow: #ffcc00;
            --bg-color: #0f172a;
            --global-bg: radial-gradient(circle at top right, #1e293b 0%, #0f172a 100%);
        }

        html, body {
            height: 100dvh; width: 100vw; margin: 0; padding: 0;
            overflow: hidden; background: var(--bg-color);
            background-image: var(--global-bg);
            background-size: cover; background-position: center;
            color: white; font-family: 'Inter', sans-serif;
            transition: background 0.4s ease, background-image 0.4s ease;
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        .dashboard-header { width: 100%; height: 85px; background: var(--glass); backdrop-filter: blur(30px); border-bottom: 1px solid var(--glass-border); display: flex; justify-content: space-between; align-items: center; padding: 0 15px; z-index: 2000; position: relative; }
        .header-left { display: flex; align-items: center; gap: 12px; cursor: pointer; position: relative; }
        .main-dp-container { position: relative; width: 60px; height: 60px; }
        .header-status-dot { position: absolute; top: 0; right: 0; width: 15px; height: 15px; background: var(--call-green); border: 2.5px solid #0f172a; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 8px; color: white; z-index: 5; }
        .main-dp { width: 100%; height: 100%; border-radius: 50%; background: rgba(255,255,255,0.1); background-size: cover; background-position: center; border: 2px solid var(--call-green); }
        .user-info { display: flex; flex-direction: column; }
        .user-full-name { font-size: 16px; font-weight: 800; text-transform: capitalize; }
        .online-status-text { font-size: 11px; font-weight: 700; color: var(--call-green); }
        .header-right { display: flex; gap: 20px; }
        .nav-btn i { font-size: 24px; display: inline-block; cursor: pointer; }
        .calls-btn i { color: var(--call-green); }
        .settings-btn i { color: var(--settings-yellow); }
        .search-area { padding: 15px 20px; }
        .premium-search-box { background: var(--glass); border: 1px solid var(--glass-border); height: 50px; border-radius: 25px; padding: 0 18px; display: flex; align-items: center; gap: 10px; }
        .premium-search-box input { background: transparent; border: none; outline: none; color: white; flex: 1; font-size: 14px; font-weight: 600; }
        .dashboard-content { height: calc(100dvh - 160px); overflow-y: auto; padding: 10px 20px; display: flex; flex-direction: column; gap: 12px; }
        .user-card { background: var(--glass); border: 1px solid var(--glass-border); border-radius: 20px; padding: 15px; display: flex; align-items: center; gap: 15px; transition: 0.2s; cursor: pointer; position: relative; user-select: none; }
        .user-card:active { transform: scale(0.94) translateY(4px); background: rgba(255,255,255,0.12); }
        .card-dp-wrapper { position: relative; width: 55px; height: 55px; }
        .card-dp { width: 100%; height: 100%; border-radius: 50%; background: var(--accent); display: flex; align-items: center; justify-content: center; font-weight: 800; font-size: 18px; background-size: cover; background-position: center; border: 2px solid var(--call-green); }
        .card-online-dot { position: absolute; top: 0; right: 0; width: 15px; height: 15px; background: var(--call-green); border: 2.5px solid #0f172a; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 8px; color: white; }
        .sync-row { display: flex; align-items: center; gap: 5px; font-size: 12px; color: rgba(255,255,255,0.6); margin-top: 2px; }
        .blue-tick { color: #38bdf8; font-size: 14px; }
        .time-label { font-size: 11px; color: rgba(255,255,255,0.4); font-weight: 600; margin-left: auto; text-align: right; }
        .status-active-txt { color: var(--call-green); font-size: 11px; font-weight: 800; }
        .full-panel { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: var(--bg-color); background-image: var(--global-bg); background-size: cover; background-position: center; backdrop-filter: blur(50px); display: none; flex-direction: column; z-index: 3000; overflow-y: auto; transition: transform 0.4s ease; }
        .panel-header { height: 85px; background: var(--glass); display: flex; justify-content: space-between; align-items: center; padding: 0 20px; border-bottom: 1px solid var(--glass-border); flex-shrink: 0; }
        .back-btn-trans { background: rgba(255,255,255,0.1); border: 1px solid var(--glass-border); padding: 8px 15px; border-radius: 10px; color: white; font-weight: 800; font-size: 12px; cursor: pointer; }
        #callOverlayWindow { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: 9999; display: none; background: #0f172a; }
        #callFrame { width: 100%; height: 100%; border: none; }
        #lockOverlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(15, 23, 42, 0.6); backdrop-filter: blur(40px); display: none; align-items: center; justify-content: center; z-index: 9999; }
        .lock-box-fixed { width: 280px; padding: 40px 20px; background: rgba(30, 41, 59, 0.9); border: 1px solid var(--glass-border); border-radius: 40px; text-align: center; box-shadow: 0 20px 40px rgba(0,0,0,0.4); }
        .lock-icon-pop { font-size: 45px; color: var(--accent); margin-bottom: 15px; }
        .lock-title-pop { font-size: 18px; font-weight: 800; margin-bottom: 25px; color: white; }
        .pin-box-styled { width: 150px; height: 60px; background: rgba(255, 255, 255, 0.08); border: 2px solid var(--accent); border-radius: 15px; margin: 0 auto; display: flex; align-items: center; justify-content: center; font-size: 22px; font-weight: 800; color: white; cursor: pointer; }
        #pinHiddenInput { position: absolute; opacity: 0; pointer-events: none; width: 1px; }
        .error-pop { color: var(--call-red); font-size: 11px; font-weight: 700; margin-top: 15px; height: 15px; }
        .shake-ui { animation: shakeMe 0.4s ease; border-color: var(--call-red) !important; }
        @keyframes shakeMe { 0%, 100% { transform: translateX(0); } 20%, 60% { transform: translateX(-8px); } 40%, 80% { transform: translateX(8px); } }
        .profile-content { padding: 30px; display: flex; flex-direction: column; gap: 20px; }
        .dp-wrapper { position: relative; align-self: center; }
        .profile-dp-large { width: 115px; height: 115px; border-radius: 50%; background: rgba(255,255,255,0.05); border: 4px solid var(--accent); background-size: cover; background-position: center; position: relative; box-shadow: 0 0 15px var(--accent); }
        .profile-camera-btn { position: absolute; bottom: 5px; right: 5px; width: 34px; height: 34px; background: #475569; border: 3px solid #0f172a; border-radius: 50%; display: flex; align-items: center; justify-content: center; cursor: pointer; color: white; z-index: 10; }
        .label-text { font-size: 13px; font-weight: 700; color: white; margin-bottom: 5px; margin-left: 5px; }
        .input-group { display: flex; flex-direction: column; }
        .input-box { width: 100%; background: var(--glass); border: 1px solid var(--glass-border); border-radius: 12px; padding: 12px; color: white; font-weight: 600; outline: none; }
        .setting-row { display: flex; justify-content: space-between; align-items: center; background: var(--glass); padding: 14px 18px; border-radius: 15px; border: 1px solid var(--glass-border); }
        .save-btn-half { width: 50%; align-self: center; background: var(--accent); border: none; padding: 14px; border-radius: 30px; color: #0f172a; font-weight: 900; font-size: 16px; cursor: pointer; margin-top: 20px; }
        .logout-btn-red { width: 50%; align-self: center; background: var(--call-red); border: none; padding: 14px; border-radius: 30px; color: white; font-weight: 900; font-size: 16px; cursor: pointer; margin-top: 15px; }
        .settings-card { background: var(--glass); border: 1px solid var(--glass-border); border-radius: 18px; padding: 15px; display: flex; align-items: center; justify-content: space-between; margin-bottom: 12px; }
        .icon-box { width: 38px; height: 38px; border-radius: 10px; display: flex; align-items: center; justify-content: center; font-size: 18px; margin-right: 12px; }
        .bg-palette { background: linear-gradient(45deg, #f43f5e, #fbbf24); }
        .bg-gallery { background: #22c55e; }
        .bg-lock { background: #6366f1; }
        .theme-circle { width:30px; height:30px; border-radius:50%; border:2px solid white; cursor:pointer; margin-left:8px; }
        .txt-red { color: var(--call-red); font-weight: 800; text-transform: capitalize; }
        .txt-green { color: var(--call-green); font-weight: 800; text-transform: capitalize; }
        .switch { position: relative; display: inline-block; width: 44px; height: 24px; }
        .switch input { opacity: 0; width: 0; height: 0; }
        .slider { position: absolute; cursor: pointer; top: 0; left: 0; right: 0; bottom: 0; background-color: rgba(255,255,255,0.1); transition: .4s; border-radius: 24px; border: 1px solid var(--glass-border); }
        .slider:before { position: absolute; content: ""; height: 18px; width: 18px; left: 3px; bottom: 2px; background-color: white; transition: .4s; border-radius: 50%; }
        input:checked + .slider { background-color: var(--accent); }
        input:checked + .slider:before { transform: translateX(20px); }
        .slide-down { transform: translateY(100%); }

        .admin-blocked { display: none !important; }
    </style>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>

    <div id="callOverlayWindow"><iframe id="callFrame" src="about:blank"></iframe></div>
    <div id="lockOverlay">
        <div class="lock-box-fixed" id="lockBoxUI">
            <div class="lock-icon-pop"><i class="fa-solid fa-lock"></i></div>
            <div class="lock-title-pop" id="lockHeadingText">App lock</div>
            <div class="pin-box-styled" id="pinDisplay" onclick="document.getElementById('pinHiddenInput').focus()">Pin code</div>
            <input type="password" id="pinHiddenInput" maxlength="4" oninput="handlePinEntry(this)">
            <div class="error-pop" id="pinError"></div>
        </div>
    </div>

    <div class="dashboard-header">
        <div class="header-left" id="profileHeaderTrigger" onclick="openPanel('profilePanel')">
            <div class="main-dp-container">
                <div class="main-dp" id="headerDP"></div>
                <div class="header-status-dot"><i class="fa-solid fa-check"></i></div>
            </div>
            <div class="user-info">
                <div class="user-full-name" id="headerName">Guest User</div>
                <div class="online-status-text">Online</div>
            </div>
        </div>
        <div class="header-right">
            <div class="nav-btn calls-btn" id="callNavBtn" onclick="openPanel('callPanel')"><i class="fa-solid fa-phone"></i></div>
            <div class="nav-btn settings-btn" id="settingsNavBtn" onclick="openPanel('settingsPanel')"><i class="fa-solid fa-gear"></i></div>
        </div>
    </div>

    <div class="search-area">
        <div class="premium-search-box">
            <i class="fa-solid fa-magnifying-glass" style="color:var(--accent)"></i>
            <input type="text" id="mainSearchInput" placeholder="Search User ID..." oninput="autoSearchUser(this.value)">
        </div>
    </div>

    <div class="dashboard-content" id="userList"></div>

    <div id="profilePanel" class="full-panel">
        <div class="panel-header">
            <div style="font-weight:900; font-size:20px; display:flex; align-items:center; gap:10px;"><i class="fa-solid fa-user-pen" style="color:var(--accent)"></i> Profile Settings</div>
            <div class="back-btn-trans" onclick="closePanel('profilePanel')">Back</div>
        </div>
        <div class="profile-content">
            <div class="dp-wrapper">
                <div class="profile-dp-large" id="profileDPLarge"></div>
                <div class="profile-camera-btn" id="imageUploadBtn" onclick="document.getElementById('dpInput').click()"><i class="fa-solid fa-camera"></i></div>
            </div>
            <div class="input-group">
                <div class="label-text">Full Name</div>
                <input type="text" id="pName" class="input-box" placeholder="Enter full name...">
            </div>
            <div class="input-group">
                <div class="label-text">Description</div>
                <textarea id="pDesc" class="input-box" rows="2" placeholder="Write description..."></textarea>
            </div>
            <div id="profileTogglesGroup" style="display:flex; flex-direction:column; gap:10px; margin-top: 5px;">
                <div class="setting-row"><span>Full Name Hidden</span><label class="switch"><input type="checkbox"><span class="slider"></span></label></div>
                <div class="setting-row"><span>Description Hidden</span><label class="switch"><input type="checkbox"><span class="slider"></span></label></div>
                <div class="setting-row" id="voiceToggleRow"><span>Voice Hidden</span><label class="switch"><input type="checkbox"><span class="slider"></span></label></div>
                <div class="setting-row" id="imageToggleRow"><span>Image Hidden</span><label class="switch"><input type="checkbox"><span class="slider"></span></label></div>
                <div class="setting-row"><span>Call Blocked</span><label class="switch"><input type="checkbox"><span class="slider"></span></label></div>
            </div>
            <button class="save-btn-half" onclick="saveProfile()">Save</button>
        </div>
    </div>

    <div id="callPanel" class="full-panel">
        <div class="panel-header">
            <div style="font-weight:900; font-size:20px; display:flex; align-items:center; gap:10px;"><i class="fa-solid fa-phone" style="color:var(--call-green);"></i> Call History</div>
            <div class="back-btn-trans" onclick="closePanel('callPanel')">Back</div>
        </div>
        <div style="padding:20px; display:flex; flex-direction:column; gap:12px;" id="callHistoryList"></div>
    </div>

    <div id="settingsPanel" class="full-panel">
        <div class="panel-header">
            <div style="font-weight:900; font-size:20px; display:flex; align-items:center; gap:10px;"><i class="fa-solid fa-gear" style="color:var(--settings-yellow)"></i> Settings</div>
            <div class="back-btn-trans" onclick="closePanel('settingsPanel')">Back</div>
        </div>
        <div style="padding:20px;">
            <div class="settings-card">
                <div style="display:flex; align-items:center;"><div class="icon-box bg-palette"><i class="fa-solid fa-palette"></i></div><span style="font-weight:800;">Dashboard Theme</span></div>
                <div style="display:flex;"><div class="theme-circle" onclick="setTheme('default')" style="background:#1e293b;"></div><div class="theme-circle" onclick="setTheme('#7f1d1d')" style="background:#7f1d1d;"></div><div class="theme-circle" onclick="setTheme('#000000')" style="background:#000000;"></div></div>
            </div>
            <div class="settings-card">
                <div style="display:flex; align-items:center;"><div class="icon-box bg-gallery"><i class="fa-solid fa-image"></i></div><span style="font-weight:800;">Choose Image</span></div>
                <button class="back-btn-trans" onclick="document.getElementById('bgInput').click()">Gallery</button>
            </div>
            <div class="settings-card">
                <div style="display:flex; align-items:center;"><div class="icon-box bg-lock"><i class="fa-solid fa-lock"></i></div><span style="font-weight:800;">Privacy Lock</span> <span id="lockStatusTxt" class="txt-red" style="margin-left:8px;">Disable</span></div>
                <label class="switch"><input type="checkbox" id="lockToggler" onchange="toggleLockHandler(this)"><span class="slider"></span></label>
            </div>
            <div class="settings-card" style="display:block; text-align: center;">
                <p style="margin:0 0 10px 0; font-size:13px; font-weight:800; color:var(--accent);">Message Online Real Time</p>
                <div style="border-top:1px solid var(--glass-border); padding-top:10px; display: flex; flex-direction: column; align-items: center; gap: 15px;">
                    <span style="font-size:13px; color:var(--accent); font-weight:800; cursor:pointer;" onclick="masterReset()">Reset Password @@99</span>
                    <button class="logout-btn-red" onclick="handleLogout()">Logout</button>
                </div>
            </div>
        </div>
    </div>

    <input type="file" id="dpInput" style="display:none;" onchange="loadPhoto(event)">
    <input type="file" id="bgInput" style="display:none;" onchange="applyBg(event)">

    <script>
        // --- 1. CORE CONNECTIVITY ---
        const socket = io();
        const currentUser = localStorage.getItem('loggedInUser');

        // --- 2. SEARCH & LIST LOGIC ---
        const registeredUsers = [
            { id: "user@1", name: "User One", dp: "https://via.placeholder.com/100/00d2ff/ffffff?text=1" },
            { id: "user@2", name: "User Two", dp: "https://via.placeholder.com/100/22c55e/ffffff?text=2" },
            { id: "user@3", name: "User Three", dp: "https://via.placeholder.com/100/ffcc00/ffffff?text=3" },
            { id: "user@4", name: "User Four", dp: "https://via.placeholder.com/100/ff4b2b/ffffff?text=4" },
            { id: "user@5", name: "User Five", dp: "https://via.placeholder.com/100/38bdf8/ffffff?text=5" }
        ];

        let activeDashboardUsers = JSON.parse(localStorage.getItem(`active_list_${currentUser}`)) || [];

        function renderUserList(filtered = null) {
            const list = document.getElementById('userList');
            list.innerHTML = "";
            const toShow = filtered || activeDashboardUsers;

            toShow.forEach((user) => {
                // LAST MESSAGE SYNC logic
                const chatKey = `chat_history_${currentUser}_with_${user.id}`;
                const msgs = JSON.parse(localStorage.getItem(chatKey)) || [];
                const lastMsg = msgs.length > 0 ? msgs[msgs.length - 1] : { content: "No messages yet", time: "" };

                const card = document.createElement('div');
                card.className = "user-card";
                const isSearchMode = filtered !== null;
                
                const statusHTML = isSearchMode ? 
                    `<span class="status-active-txt">User Activate</span>` : 
                    `<i class="fa-solid fa-check-double blue-tick"></i><span style="font-size:12px; color:rgba(255,255,255,0.6)">${lastMsg.content}</span>`;
                
                const timeHTML = isSearchMode ? '' : (lastMsg.time || `Active Now`);

                card.innerHTML = `
                    <div class="card-dp-wrapper">
                        <div class="card-dp" style="background-image: url('${user.dp}');"></div>
                        <div class="card-online-dot"><i class="fa-solid fa-check"></i></div>
                    </div>
                    <div style="flex:1; overflow:hidden;">
                        <span style="font-weight:800; font-size:15px;">${user.id}</span>
                        <div class="sync-row" style="white-space: nowrap; overflow: hidden; text-overflow: ellipsis;">
                            ${statusHTML}
                        </div>
                    </div>
                    <div class="time-label">${timeHTML}</div>
                `;
                
                card.onclick = () => {
                    if (!activeDashboardUsers.some(u => u.id === user.id)) {
                        activeDashboardUsers.push(user);
                        localStorage.setItem(`active_list_${currentUser}`, JSON.stringify(activeDashboardUsers));
                    }
                    window.location.href = `chat.html?id=${user.id}&name=${encodeURIComponent(user.name)}&dp=${user.dp}`;
                };
                list.appendChild(card);
            });
        }

        function autoSearchUser(val) { 
            if (!val) { renderUserList(); return; } 
            const matches = registeredUsers.filter(u => u.id.toLowerCase().includes(val.toLowerCase())); 
            renderUserList(matches); 
        }

        // --- 3. SESSION & UI INITIALIZATION ---
        window.onload = () => {
            if (!currentUser) {
                window.location.replace("index.html");
            } else {
                document.getElementById('headerName').innerText = currentUser;
                socket.emit('user-login', currentUser); // Real-time notification
            }
            renderUserList();
            applyAdminRestrictions();
        };

        function applyAdminRestrictions() {
            const admin = JSON.parse(localStorage.getItem('admin_settings'));
            if (!admin) return;
            if (admin.callDisabled) document.getElementById('callNavBtn').classList.add('admin-blocked');
            if (admin.settingsLocked) document.getElementById('settingsNavBtn').classList.add('admin-blocked');
            if (admin.profileTogglesHidden) document.getElementById('profileTogglesGroup').classList.add('admin-blocked');
        }

        function handleLogout() { 
            localStorage.removeItem('loggedInUser'); 
            window.location.replace("index.html"); 
        }

        // --- 4. CALL SYSTEM INTEGRATION ---
        window.addEventListener('message', function(event) {
            if (event.data === 'END_CALL') {
                document.getElementById('callOverlayWindow').style.display = 'none';
                document.getElementById('callFrame').src = 'about:blank';
            }
        });

        // --- 5. REMAINING ORIGINAL UI LOGIC (Lock, Profile, Themes) ---
        let lockStage = 0; let savedPIN = localStorage.getItem('app_pin_code') || ""; const resetKey = "@@99";
        if(savedPIN) { document.getElementById('lockToggler').checked = true; updateLockUI(true); document.getElementById('lockOverlay').style.display = 'flex'; }
        function updateLockUI(enabled) { const txt = document.getElementById('lockStatusTxt'); if(enabled) { txt.innerText = "Enable"; txt.className = "txt-green"; } else { txt.innerText = "Disable"; txt.className = "txt-red"; } }
        function toggleLockHandler(el) { if(el.checked) { if(!savedPIN) { lockStage = 1; openPopup("Four Digit Code"); } } else { lockStage = 3; openPopup("Enter PIN to Disable"); el.checked = true; } }
        function openPopup(title) { document.getElementById('lockHeadingText').innerText = title; document.getElementById('lockOverlay').style.display = 'flex'; document.getElementById('pinHiddenInput').focus(); }
        function handlePinEntry(input) {
            const val = input.value; const display = document.getElementById('pinDisplay');
            if(val.length === 0) display.innerText = "Pin code"; else display.innerText = val.split('').map(() => "•").join('');
            if(val.length === 4) {
                if(val === resetKey) { forceDisable(); return; }
                if(lockStage === 1) { tempPIN = val; lockStage = 2; resetUI("Confirm Code"); } 
                else if(lockStage === 2) { if(val === tempPIN) { savedPIN = val; localStorage.setItem('app_pin_code', val); closePopup(); updateLockUI(true); } else { triggerErr("PIN MISMATCH!"); lockStage = 1; } } 
                else if(savedPIN && val === savedPIN) { if(lockStage === 3) { savedPIN = ""; localStorage.removeItem('app_pin_code'); document.getElementById('lockToggler').checked = false; updateLockUI(false); } closePopup(); } else triggerErr("WRONG PIN!");
            }
        }
        function resetUI(title) { document.getElementById('pinHiddenInput').value = ""; document.getElementById('pinDisplay').innerText = "Pin code"; document.getElementById('lockHeadingText').innerText = title; }
        function triggerErr(msg) { const box = document.getElementById('lockBoxUI'); box.classList.add('shake-ui'); document.getElementById('pinError').innerText = msg; setTimeout(() => { box.classList.remove('shake-ui'); resetUI("Enter PIN"); document.getElementById('pinError').innerText = ""; }, 800); }
        function forceDisable() { savedPIN = ""; localStorage.removeItem('app_pin_code'); document.getElementById('lockToggler').checked = false; closePopup(); updateLockUI(false); }
        function closePopup() { document.getElementById('lockOverlay').style.display = 'none'; document.getElementById('pinHiddenInput').value = ""; document.getElementById('pinDisplay').innerText = "Pin code"; lockStage = 0; }
        function masterReset() { forceDisable(); }
        function openPanel(id) { document.getElementById(id).style.display = 'flex'; document.getElementById(id).classList.remove('slide-down'); }
        function closePanel(id) { document.getElementById(id).classList.add('slide-down'); setTimeout(()=> {document.getElementById(id).style.display='none';}, 400); }
        function saveProfile() { const n = document.getElementById('pName').value.trim(); if(n) document.getElementById('headerName').innerText = n; closePanel('profilePanel'); }
        function loadPhoto(e) { const f = e.target.files[0]; if(!f) return; const u = URL.createObjectURL(f); document.getElementById('profileDPLarge').style.backgroundImage = `url(${u})`; document.getElementById('headerDP').style.backgroundImage = `url(${u})`; }
        function setTheme(c) { if(c === 'default') { document.documentElement.style.setProperty('--bg-color', '#0f172a'); document.documentElement.style.setProperty('--global-bg', 'radial-gradient(circle at top right, #1e293b 0%, #0f172a 100%)'); } else { document.documentElement.style.setProperty('--bg-color', c); document.documentElement.style.setProperty('--global-bg', 'none'); } }
        function applyBg(e) { const f = e.target.files[0]; if(!f) return; const u = URL.createObjectURL(f); document.documentElement.style.setProperty('--global-bg', `url(${u})`); }
    </script>
</body>
