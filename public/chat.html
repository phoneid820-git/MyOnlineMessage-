<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Message - Real Time Chat</title>
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
    <script src="/socket.io/socket.io.js"></script>
    <style>
        /* --- ALL ORIGINAL CSS PRESERVED --- */
        :root {
            --glass: rgba(255, 255, 255, 0.08);
            --glass-border: rgba(255, 255, 255, 0.15);
            --accent: #00d2ff;
            --bg-color: #0f172a;
            --global-bg: radial-gradient(circle at top right, #1e293b 0%, #0f172a 100%);
            --seen: #38bdf8; 
            --call-green: #22c55e;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Inter', sans-serif; }

        body {
            height: 100dvh; width: 100vw;
            background: var(--bg-color); background-image: var(--global-bg);
            color: white; display: flex; flex-direction: column; overflow: hidden;
        }

        header {
            position: fixed; top: 0; right: 0;
            width: 100%; height: 85px;
            padding: calc(10px + env(safe-area-inset-top)) 15px 10px 15px;
            background: var(--glass); backdrop-filter: blur(30px);
            border-bottom: 1px solid var(--glass-border);
            display: flex; align-items: center; justify-content: space-between;
            z-index: 1000; transform: translateX(100%);
            transition: transform 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        header.active { transform: translateX(0); }

        .header-trigger {
            position: fixed; top: 20px; right: 10px; z-index: 1001; cursor: pointer;
            background: var(--glass); border-radius: 50%; padding: 8px; border: 1px solid var(--glass-border);
            display: flex; align-items: center; justify-content: center;
        }

        .left-header { display: flex; align-items: center; gap: 15px; }
        .trash-btn { color: rgba(255, 255, 255, 0.4); cursor: pointer; font-size: 32px !important; }

        .chat-user-info { display: flex; align-items: center; gap: 12px; }
        .chat-dp { width: 48px; height: 48px; border-radius: 50%; border: 2px solid var(--call-green); background-size: cover; background-position: center; }
        .user-details { display: flex; flex-direction: column; }
        .user-details .name { font-weight: 800; font-size: 17px; display: block; }
        .user-details .status { font-size: 11px; color: var(--call-green); font-weight: 700; }

        .call-icon { color: var(--call-green); font-size: 35px !important; cursor: pointer; margin-right: 40px; }

        .admin-hidden { display: none !important; }

        #callOverlay {
            position: fixed; inset: 0;
            background: rgba(15, 23, 42, 0.9); backdrop-filter: blur(50px);
            z-index: 3000; display: none; flex-direction: column;
            align-items: center; justify-content: center; gap: 40px;
        }
        .call-user-card { text-align: center; }
        .calling-dp-large { width: 130px; height: 130px; border-radius: 50%; border: 4px solid var(--call-green); margin: 0 auto 20px; background-size: cover; background-position: center; box-shadow: 0 0 30px rgba(34, 197, 94, 0.3); }
        .calling-name-large { font-size: 32px; font-weight: 800; }
        .call-status-label { color: var(--call-green); margin-top: 10px; font-weight: 600; font-size: 18px; }

        .call-action-row { display: flex; gap: 25px; align-items: center; margin-top: 20px; }
        .call-tool-btn { width: 60px; height: 60px; border-radius: 50%; background: var(--glass); border: 1px solid var(--glass-border); display: flex; align-items: center; justify-content: center; color: white; cursor: pointer; }
        .call-tool-btn.end { background: #ef4444; border: none; width: 75px; height: 75px; color: white; }

        #chat-window { flex: 1; overflow-y: auto; padding: 100px 15px 20px 15px; display: flex; flex-direction: column; gap: 12px; }

        .msg { max-width: 82%; padding: 10px 14px; border-radius: 18px; font-size: 14.5px; position: relative; word-wrap: break-word; }
        .msg.sent { align-self: flex-end; background: rgba(255,255,255,0.15); border-bottom-right-radius: 4px; }
        .msg.received { align-self: flex-start; background: var(--glass); border-bottom-left-radius: 4px; }
        .chat-img, .chat-vid { width: 100%; max-width: 250px; border-radius: 12px; margin-top: 5px; }

        .input-area { padding: 12px; background: transparent; width: 100%; }
        .input-container { 
            background: var(--glass); border: 1px solid var(--glass-border); 
            border-radius: 35px; display: flex; align-items: center; 
            padding: 5px 6px 5px 15px; backdrop-filter: blur(30px); min-height: 56px;
        }
        .input-container input { flex: 1; background: none; border: none; outline: none; color: white; padding: 10px; font-size: 16px; width: 100%; }
        .main-action-btn { width: 44px; height: 44px; border-radius: 50%; background: var(--call-green); border: none; color: #0f172a; cursor: pointer; display: flex; align-items: center; justify-content: center; }
    </style>
</head>
<body>

    <div class="header-trigger" id="headerTrigger" onclick="handleHeaderLogic()">
        <i class="material-icons" id="triggerIcon">chevron_left</i>
    </div>

    <header id="chatHeader">
        <div class="left-header">
            <i class="material-icons trash-btn" onclick="clearChat()">delete</i>
            <div class="chat-user-info">
                <div class="chat-dp" id="targetDP"></div>
                <div class="user-details">
                    <span class="name" id="targetName">Loading...</span>
                    <span class="status" id="onlineIndicator">Online</span>
                </div>
            </div>
        </div>
        <i class="material-icons call-icon" id="callIconBtn" onclick="openCallWindow()">call</i>
    </header>

    <div id="callOverlay">
        <div class="call-user-card">
            <div class="calling-dp-large" id="callOverlayDP"></div>
            <div class="calling-name-large" id="callOverlayName">User</div>
            <div class="call-status-label" id="activeCallTimer">00:00</div>
        </div>
        <div class="call-action-row">
            <div class="call-tool-btn"><i class="material-icons">mic_off</i></div>
            <div class="call-tool-btn end" onclick="endCall()"><i class="material-icons" style="font-size: 35px;">call_end</i></div>
            <div class="call-tool-btn"><i class="material-icons">volume_up</i></div>
        </div>
    </div>

    <main id="chat-window"></main>

    <div class="input-area">
        <div class="input-container">
            <i class="material-icons" id="attachBtn" onclick="document.getElementById('fileInput').click()" style="transform: rotate(-45deg); color:#cfcfcf; cursor:pointer; margin-right: 10px;">attach_file</i>
            <input type="text" id="msgInput" placeholder="Message..." oninput="handleTyping()" onkeypress="if(event.key==='Enter') sendMessage()">
            <button id="mainActionBtn" class="main-action-btn" onclick="handleMainAction()"><i class="material-icons" id="btnIcon">mic</i></button>
        </div>
    </div>

    <input type="file" id="fileInput" hidden accept="image/*,video/*,audio/*" onchange="handleFileUpload(this)">

    <script>
        // --- REAL-TIME SERVER CONNECTION ---
        const socket = io();
        const currentUser = localStorage.getItem('loggedInUser') || "Guest";
        
        // URL se target user lena
        const urlParams = new URLSearchParams(window.location.search);
        const chatPartner = urlParams.get('name') || "User";
        const partnerDP = urlParams.get('dp') || "";

        // Server ko batana ke main online hoon
        socket.emit('user-login', currentUser);

        // Jab message server se aaye
        socket.on('receive-message', (data) => {
            if (data.fromUserId === chatPartner) {
                appendMessage(data.type, data.content, 'received', data.time);
            }
        });

        // Online/Offline status update
        socket.on('update-user-status', (data) => {
            if (data.userId === chatPartner) {
                document.getElementById('onlineIndicator').innerText = data.status === 'online' ? 'Online' : 'Offline';
                document.getElementById('onlineIndicator').style.color = data.status === 'online' ? 'var(--call-green)' : 'gray';
            }
        });

        // --- CHAT LOGIC ---
        const chatWindow = document.getElementById('chat-window');
        const msgInput = document.getElementById('msgInput');
        const btnIcon = document.getElementById('btnIcon');
        let callTimerInterval, callSeconds = 0;

        window.onload = () => {
            document.getElementById('targetName').innerText = chatPartner;
            if(partnerDP && partnerDP !== "null") {
                document.getElementById('targetDP').style.backgroundImage = `url('${partnerDP}')`;
                document.getElementById('callOverlayDP').style.backgroundImage = `url('${partnerDP}')`;
            }
            loadMessages(); // Local storage se purane message nikalna
        };

        function sendMessage() {
            const text = msgInput.value.trim();
            if(text) {
                const time = new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
                const messageData = {
                    type: 'text',
                    content: text,
                    fromUserId: currentUser,
                    toUserId: chatPartner,
                    time: time
                };

                // 1. Apni screen par dikhao
                appendMessage('text', text, 'sent', time);
                
                // 2. Server ko bhejo real-time ke liye
                socket.emit('send-message', messageData);

                msgInput.value = "";
                handleTyping();
            }
        }

        function appendMessage(type, content, side, timeStr) {
            const div = document.createElement('div');
            div.className = `msg ${side}`;
            
            if(type === 'text') div.innerHTML = `<div>${content}</div>`;
            else if(type === 'image') div.innerHTML = `<img src="${content}" class="chat-img">`;
            else if(type === 'video') div.innerHTML = `<video src="${content}" class="chat-vid" controls></video>`;
            else if(type === 'audio') div.innerHTML = `<audio src="${content}" controls style="width:200px; filter:invert(1);"></audio>`;

            div.innerHTML += `<div style="font-size:10px; margin-top:5px; text-align:right; opacity:0.6;">${timeStr} ${side==='sent'?'<i class="material-icons" style="font-size:12px; vertical-align:middle; color:var(--seen)">done_all</i>':''}</div>`;
            
            chatWindow.appendChild(div);
            chatWindow.scrollTop = chatWindow.scrollHeight;
            
            // LOCAL STORAGE SAVING: Kabhi delete nahi hoga
            saveToStorage(type, content, side, timeStr);
        }

        function saveToStorage(type, content, side, time) {
            let storageKey = `chat_history_${currentUser}_with_${chatPartner}`;
            let msgs = JSON.parse(localStorage.getItem(storageKey)) || [];
            
            // Duplicate check: Agar same message pehle se hai to save na karein
            const isDuplicate = msgs.some(m => m.content === content && m.time === time);
            if (!isDuplicate) {
                msgs.push({type, content, side, time});
                localStorage.setItem(storageKey, JSON.stringify(msgs));
            }
        }

        function loadMessages() {
            let storageKey = `chat_history_${currentUser}_with_${chatPartner}`;
            let msgs = JSON.parse(localStorage.getItem(storageKey)) || [];
            chatWindow.innerHTML = "";
            msgs.forEach(m => {
                // UI mein dikhane ke liye bina dobara save kiye append karein
                const div = document.createElement('div');
                div.className = `msg ${m.side}`;
                if(m.type === 'text') div.innerHTML = `<div>${m.content}</div>`;
                else if(m.type === 'image') div.innerHTML = `<img src="${m.content}" class="chat-img">`;
                div.innerHTML += `<div style="font-size:10px; margin-top:5px; text-align:right; opacity:0.6;">${m.time}</div>`;
                chatWindow.appendChild(div);
            });
            chatWindow.scrollTop = chatWindow.scrollHeight;
        }

        function handleHeaderLogic() {
            const header = document.getElementById('chatHeader');
            const icon = document.getElementById('triggerIcon');
            if (!header.classList.contains('active')) {
                header.classList.add('active');
                icon.innerText = "arrow_back";
            } else { window.location.href = 'dashboard.html'; }
        }

        function handleTyping() { 
            btnIcon.innerText = msgInput.value.trim() ? "send" : "mic"; 
        }

        function handleMainAction() {
            if(btnIcon.innerText === "send") sendMessage();
        }

        function clearChat() {
            if(confirm("Poori chat delete kar dein?")) {
                localStorage.removeItem(`chat_history_${currentUser}_with_${chatPartner}`);
                chatWindow.innerHTML = "";
            }
        }

        function openCallWindow() {
            socket.emit('call-user', { toCall: chatPartner, from: currentUser, type: 'audio' });
            document.getElementById('callOverlayName').innerText = chatPartner;
            document.getElementById('callOverlay').style.display = 'flex';
            startCallTimer();
        }

        function endCall() {
            clearInterval(callTimerInterval);
            document.getElementById('callOverlay').style.display = 'none';
        }

        function startCallTimer() {
            callSeconds = 0;
            callTimerInterval = setInterval(() => {
                callSeconds++;
                let m = Math.floor(callSeconds/60), s = callSeconds%60;
                document.getElementById('activeCallTimer').innerText = `${m<10?'0':''}${m}:${s<10?'0':''}${s}`;
            }, 1000);
        }
    </script>
</body>
</html>
