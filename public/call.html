<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Pro Call System - Advanced Logic</title>
    <script src="/socket.io/socket.io.js"></script>
    <style>
        /* --- ALL ORIGINAL CSS PRESERVED --- */
        :root { 
            --bg-color: #0f172a; 
            --glass: rgba(255, 255, 255, 0.12); 
            --glass-border: rgba(255, 255, 255, 0.18); 
            --accent: #00d2ff; 
            --red-call: #ff3b30; 
            --green-call: #34c759; 
        }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; -webkit-tap-highlight-color: transparent; }
        
        body { 
            height: 100dvh; 
            background: var(--bg-color); 
            background-image: radial-gradient(circle at top right, #1e293b 0%, #0f172a 100%); 
            color: white; 
            overflow: hidden; 
            display: flex; justify-content: center; align-items: center; 
        }

        .call-wrapper { width: 100%; height: 100%; position: relative; }

        .call-screen { 
            width: 100%; height: 100%; display: none; 
            flex-direction: column; align-items: center; 
            padding: 60px 20px; animation: fadeIn 0.4s ease; 
        }
        .active { display: flex; }

        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        @keyframes phone-vibrate { 
            0% { transform: rotate(0) translate(0); }
            10% { transform: rotate(10deg) translate(2px, -2px); }
            20% { transform: rotate(-10deg) translate(-2px, 2px); }
            30% { transform: rotate(10deg) translate(2px, 2px); }
            40% { transform: rotate(-10deg) translate(-2px, -2px); }
            50% { transform: rotate(0) translate(0); }
        }

        .profile-section { text-align: center; width: 100%; margin-bottom: 40px; transition: 0.5s; }
        .user-dp { 
            width: 120px; height: 120px; border-radius: 50%; 
            background: #2d3748; display: flex; align-items: center; justify-content: center; 
            margin: 0 auto 20px; border: 3px solid var(--glass-border); 
            box-shadow: 0 0 30px rgba(0, 210, 255, 0.2);
            background-size: cover; background-position: center; overflow: hidden;
        }
        
        .ringing .user-dp { animation: pulse-ring 1.5s infinite; }
        @keyframes pulse-ring {
            0% { box-shadow: 0 0 0 0 rgba(0, 210, 255, 0.4); }
            70% { box-shadow: 0 0 0 25px rgba(0, 210, 255, 0); }
            100% { box-shadow: 0 0 0 0 rgba(0, 210, 255, 0); }
        }

        .caller-name { font-size: 32px; font-weight: 600; margin-bottom: 8px; }
        .call-status { font-size: 18px; color: var(--accent); font-weight: 500; min-height: 24px; }
        .call-timer { font-size: 22px; font-weight: 600; margin-top: 10px; display: none; }

        .controls-panel { display: flex; justify-content: space-evenly; width: 100%; max-width: 400px; margin-top: auto; padding-bottom: 50px; }
        .action-btn { 
            width: 75px; height: 75px; border-radius: 50%; 
            display: flex; align-items: center; justify-content: center; 
            font-size: 26px; color: white; border: none; cursor: pointer; 
            background: var(--glass); backdrop-filter: blur(20px); 
            transition: all 0.3s; 
        }
        .btn-label { font-size: 13px; margin-top: 10px; opacity: 0.8; text-align: center; }
        .btn-red { background: var(--red-call) !important; color: white; }
        .active-tool { background: white !important; color: #000 !important; }

        .slider-container { 
            width: 100%; max-width: 320px; height: 80px; background: rgba(255,255,255,0.08); 
            border-radius: 40px; position: relative; display: flex; 
            align-items: center; justify-content: center;
            border: 1px solid var(--glass-border); 
            margin-top: auto; margin-bottom: 50px; overflow: hidden;
        }
        .slider-handle { 
            width: 66px; height: 66px; background: white; border-radius: 50%; 
            position: absolute; left: 7px; display: flex; align-items: center; 
            justify-content: center; color: var(--green-call); font-size: 28px; 
            box-shadow: 0 4px 15px rgba(0,0,0,0.5); z-index: 10; cursor: grab;
        }
        .slider-handle i { animation: phone-vibrate 1.5s infinite; }
        
        .slider-text { color: white; font-weight: 500; opacity: 0.5; font-size: 17px; text-transform: capitalize; letter-spacing: 0.5px; user-select: none; }

        #busyOverlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.8); backdrop-filter: blur(10px);
            display: none; flex-direction: column; align-items: center; justify-content: center;
            z-index: 1000; text-align: center;
        }
    </style>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>

    <div id="busyOverlay">
        <i class="fa-solid fa-phone-slash" id="busyIcon" style="font-size: 50px; color: var(--red-call); margin-bottom: 20px;"></i>
        <h2 id="busyTitle">Line Busy</h2>
        <p id="busyMsg" style="opacity: 0.7;">User is currently on another call.</p>
    </div>

    <div class="call-wrapper" id="mainWrapper">
        <div id="incomingScreen" class="call-screen active ringing">
            <div class="profile-section">
                <div class="user-dp" id="incomingDP"></div>
                <h1 class="caller-name" id="incomingName">Connecting...</h1>
                <p class="call-status" id="statusLabel">Incoming Call</p>
            </div>

            <div class="slider-container" id="sliderContainer">
                <div class="slider-handle" id="sliderHandle"><i class="fa-solid fa-phone"></i></div>
                <div class="slider-text">Slide to answer</div>
            </div>
        </div>

        <div id="ongoingScreen" class="call-screen">
            <div class="profile-section">
                <div class="user-dp" id="ongoingDP"></div>
                <h1 class="caller-name" id="ongoingName">User</h1>
                <p class="call-timer" id="timer" style="display: block;">00:00</p>
            </div>

            <div class="controls-panel">
                <div class="btn-group">
                    <button class="action-btn" onclick="toggleBtn(this)"><i class="fa-solid fa-microphone-slash"></i></button>
                    <div class="btn-label">Mute</div>
                </div>
                <div class="btn-group">
                    <button class="action-btn" onclick="toggleBtn(this)"><i class="fa-solid fa-volume-high"></i></button>
                    <div class="btn-label">Speaker</div>
                </div>
                <div class="btn-group">
                    <button class="action-btn btn-red" onclick="endCall()"><i class="fa-solid fa-phone" style="transform: rotate(135deg);"></i></button>
                    <div class="btn-label">End</div>
                </div>
            </div>
        </div>
    </div>

    <script>
        const socket = io();
        const currentUser = localStorage.getItem('loggedInUser');
        let callPartnerId = ""; 

        // Server ko connect karna
        socket.emit('user-login', currentUser);

        // Jab server se call aaye
        socket.on('incoming-call', (data) => {
            callPartnerId = data.from;
            initCall({ name: data.from, image: "" }); // Yahan aap DP link bhi bhej sakte hain
        });

        // Agar caller call cut karde
        socket.on('call-ended', () => {
            endCallLocally();
        });

        // --- ORIGINAL LOGIC INTEGRATION ---
        function initCall(data) {
            document.getElementById('incomingName').innerText = data.name;
            document.getElementById('ongoingName').innerText = data.name;
            // DP setup logic wahi rakha hai jo aapka tha
            startRinging();
        }

        function startRinging() {
            const status = document.getElementById('statusLabel');
            status.innerText = "Incoming Call...";
            // Audio Ringtone yahan add kar sakte hain
        }

        // SLIDER LOGIC
        const slider = document.getElementById('sliderHandle');
        const container = document.getElementById('sliderContainer');
        let isDragging = false;

        const moveDrag = (e) => {
            if (!isDragging) return;
            let currentX = (e.type === 'touchmove') ? e.touches[0].clientX : e.clientX;
            let rect = container.getBoundingClientRect();
            let offset = currentX - rect.left - 33;
            if (offset >= 7 && offset <= (rect.width - 73)) {
                slider.style.left = offset + 'px';
                container.style.background = `rgba(52, 199, 89, ${offset/200})`; 
            }
            if (offset > (rect.width - 90)) { isDragging = false; acceptCall(); }
        };

        slider.addEventListener('mousedown', () => isDragging = true);
        slider.addEventListener('touchstart', () => isDragging = true);
        window.addEventListener('mousemove', moveDrag);
        window.addEventListener('touchmove', moveDrag);
        window.addEventListener('mouseup', () => { isDragging = false; slider.style.left = '7px'; container.style.background = 'rgba(255,255,255,0.08)'; });
        window.addEventListener('touchend', () => { isDragging = false; slider.style.left = '7px'; container.style.background = 'rgba(255,255,255,0.08)'; });

        function acceptCall() {
            socket.emit('answer-call', { to: callPartnerId, signal: 'ACCEPTED' });
            document.getElementById('incomingScreen').classList.remove('active');
            document.getElementById('ongoingScreen').classList.add('active');
            startTimer();
        }

        function endCall() {
            socket.emit('end-call-signal', { to: callPartnerId });
            endCallLocally();
        }

        function endCallLocally() {
            clearInterval(callTimerInterval);
            window.location.href = 'dashboard.html'; // Wapas bhej dega
        }

        let callTimerInterval;
        function startTimer() {
            let seconds = 0;
            const timerEl = document.getElementById('timer');
            callTimerInterval = setInterval(() => {
                seconds++;
                let mins = Math.floor(seconds / 60);
                let secs = seconds % 60;
                timerEl.innerText = `${mins.toString().padStart(2, '0')}:${secs.toString().padStart(2, '0')}`;
            }, 1000);
        }

        function toggleBtn(el) {
            el.classList.toggle('active-tool');
        }
    </script>
</body>
</html>
